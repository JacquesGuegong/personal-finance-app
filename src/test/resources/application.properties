# ──────────────────────────────────────────────────────────────────────────────
# TEST configuration. Spring Boot loads this instead of the main
# application.properties whenever code runs under src/test.
# Goal: tests must be fast, isolated, and require ZERO external services.
# ──────────────────────────────────────────────────────────────────────────────

# ── Database: in-memory H2 instead of PostgreSQL ───────────────────────────────
# jdbc:h2:mem:... = a database that lives only in RAM for the life of the test JVM.
# MODE=PostgreSQL makes H2 imitate Postgres SQL so behaviour stays close to prod.
# DB_CLOSE_DELAY=-1 keeps the DB alive until the JVM exits (not just one connection).
spring.datasource.url=jdbc:h2:mem:financetest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── Schema management ──────────────────────────────────────────────────────────
# In prod, Flyway owns the schema and Hibernate only validates it.
# In tests there is no Flyway, so we let Hibernate CREATE the tables from the
# @Entity classes on startup and DROP them on shutdown.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

# Quote every table/column name. "date", "year", "month" are reserved words in H2;
# quoting them avoids "syntax error" when Hibernate generates CREATE TABLE.
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ── JWT ────────────────────────────────────────────────────────────────────────
# A fixed, long-enough (>= 256-bit) secret so the app context can build the
# signing key during tests. Never a real production secret.
app.jwt.secret=test-secret-key-that-is-long-enough-for-hmac-sha256-signing-1234567890
app.jwt.expiration-ms=86400000

# Quieter test logs.
logging.level.com.financetracker=WARN
spring.jpa.show-sql=false
